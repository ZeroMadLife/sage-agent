name: Backend Quality

on:
  pull_request:
  push:
    branches:
      - main
      - dev/sage-v7

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest -q

      - name: Run Ruff
        run: python -m ruff check agents api core db evals mcp_servers models packages/sage_harness/sage_harness tests

      - name: Run mypy
        run: python -m mypy core mcp_servers agents packages/sage_harness/sage_harness
