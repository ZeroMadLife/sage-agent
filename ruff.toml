# ruff 配置 — lint + format（替代 flake8 + black + isort）
# 运行：ruff check . && ruff format .

target-version = "py311"
line-length = 100
src = ["core", "mcp_servers", "agents", "tests"]

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import排序)
    "B",    # flake8-bugbear (常见bug模式)
    "UP",   # pyupgrade (现代化语法)
    "SIM",  # flake8-simplify
    "RUF",  # ruff专属规则
]
ignore = [
    "E501",   # 行长由formatter管，不单独报
    "RUF001", # 中文全角标点（字符串中），中文项目正常
    "RUF002", # 中文全角标点（docstring中），中文项目正常
    "RUF003", # 中文全角标点（注释中），中文项目正常
]

[lint.isort]
known-first-party = ["core", "mcp_servers", "agents"]

[format]
quote-style = "double"
indent-style = "space"
