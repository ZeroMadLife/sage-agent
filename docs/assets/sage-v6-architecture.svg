<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 1920 1080">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#e8f0f5" stroke-width="1"/>
    </pattern>
    <marker id="arrow-teal" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 Z" fill="#149c8e"/></marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 Z" fill="#246bce"/></marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 Z" fill="#f28c18"/></marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 Z" fill="#3a8d2b"/></marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 Z" fill="#59529a"/></marker>
    <style>
      text { font-family: Inter, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #15222d; letter-spacing: 0; }
      .module { fill: #ffffff; stroke-width: 2.4; }
      .header { font-size: 21px; font-weight: 750; }
      .body { font-size: 13.5px; font-weight: 520; text-anchor: middle; dominant-baseline: middle; }
      .body-small { font-size: 12.2px; font-weight: 520; text-anchor: middle; dominant-baseline: middle; }
      .number { font-size: 16px; font-weight: 800; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .row { stroke-width: 1.15; }
      .teal-stroke { stroke: #149c8e; } .teal-fill { fill: #f2fbf9; stroke: #83c8bf; }
      .blue-stroke { stroke: #246bce; } .blue-fill { fill: #f4f7ff; stroke: #9ab7ee; }
      .orange-stroke { stroke: #f28c18; } .orange-fill { fill: #fff8f0; stroke: #f3bd7d; }
      .green-stroke { stroke: #3a8d2b; } .green-fill { fill: #f5faf3; stroke: #9fc694; }
      .purple-stroke { stroke: #59529a; } .purple-fill { fill: #f7f6fc; stroke: #aaa5d0; }
      .amber-stroke { stroke: #e5a10b; } .amber-fill { fill: #fffbef; stroke: #e9c66e; }
      .control { fill: none; stroke: #149c8e; stroke-width: 3; marker-end: url(#arrow-teal); }
      .model { fill: none; stroke: #246bce; stroke-width: 3; marker-start: url(#arrow-blue); marker-end: url(#arrow-blue); }
      .tool { fill: none; stroke: #f28c18; stroke-width: 3; marker-end: url(#arrow-orange); }
      .persist { fill: none; stroke: #3a8d2b; stroke-width: 2.5; stroke-dasharray: 7 7; marker-end: url(#arrow-green); }
      .eval { fill: none; stroke: #59529a; stroke-width: 2.5; stroke-dasharray: 7 7; marker-end: url(#arrow-purple); }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="#fbfdfe"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <text x="960" y="58" text-anchor="middle" font-size="42" font-weight="820">Sage V6 架构图</text>
  <text x="960" y="91" text-anchor="middle" font-size="17" font-weight="550" fill="#526574">Web Coding Agent · 服务端受控工作区 · Harness Evidence Loop</text>

  <!-- Connections render behind modules. -->
  <path class="control" d="M286 275 H310"/>
  <path class="control" d="M570 275 H595"/>
  <path class="model" d="M925 272 H950"/>
  <path class="model" d="M1230 272 H1535"/>
  <path class="tool" d="M850 550 C850 578 945 600 1018 620"/>
  <path class="tool" d="M1472 695 H1545"/>
  <path class="persist" d="M805 615 C860 585 875 560 790 545"/>
  <path class="persist" d="M880 545 H965 V850 H1010"/>
  <path class="persist" d="M1250 845 V860"/>
  <path class="persist" d="M805 825 H850"/>
  <path class="eval" d="M365 600 H565 V470 H595"/>

  <!-- 1 Web workbench -->
  <g>
    <rect class="module teal-stroke" x="30" y="145" width="256" height="320" rx="12"/>
    <circle cx="61" cy="180" r="18" fill="#149c8e"/><text class="number" x="61" y="181">1</text>
    <text class="header" x="88" y="188">Web 工作台</text>
    <rect class="row teal-fill" x="52" y="214" width="212" height="32" rx="5"/><text class="body" x="158" y="230">Vue 3 + Pinia</text>
    <rect class="row teal-fill" x="52" y="254" width="212" height="32" rx="5"/><text class="body" x="158" y="270">Chat Stream</text>
    <rect class="row teal-fill" x="52" y="294" width="212" height="32" rx="5"/><text class="body" x="158" y="310">File Tree</text>
    <rect class="row teal-fill" x="52" y="334" width="212" height="32" rx="5"/><text class="body" x="158" y="350">Git Status</text>
    <rect class="row teal-fill" x="52" y="374" width="212" height="32" rx="5"/><text class="body" x="158" y="390">Diff Drawer</text>
    <rect class="row teal-fill" x="52" y="414" width="212" height="32" rx="5"/><text class="body-small" x="158" y="430">Runs / Skills / Memory</text>
  </g>

  <!-- 2 API and session -->
  <g>
    <rect class="module teal-stroke" x="310" y="145" width="260" height="280" rx="12"/>
    <circle cx="342" cy="180" r="18" fill="#149c8e"/><text class="number" x="342" y="181">2</text>
    <text class="header" x="370" y="188">API / 会话层</text>
    <rect class="row teal-fill" x="333" y="216" width="214" height="34" rx="5"/><text class="body" x="440" y="233">FastAPI</text>
    <rect class="row teal-fill" x="333" y="258" width="214" height="34" rx="5"/><text class="body" x="440" y="275">REST + WebSocket</text>
    <rect class="row teal-fill" x="333" y="300" width="214" height="34" rx="5"/><text class="body" x="440" y="317">create / resume</text>
    <rect class="row teal-fill" x="333" y="342" width="214" height="34" rx="5"/><text class="body-small" x="440" y="359">workspace root guard</text>
    <rect class="row teal-fill" x="333" y="384" width="214" height="28" rx="5"/><text class="body" x="440" y="398">Session API</text>
  </g>

  <!-- 3 Runtime -->
  <g>
    <rect class="module teal-stroke" x="595" y="120" width="330" height="430" rx="12"/>
    <circle cx="630" cy="156" r="19" fill="#149c8e"/><text class="number" x="630" y="157">3</text>
    <text class="header" x="661" y="164">主控制循环</text>
    <rect class="row teal-fill" x="622" y="190" width="276" height="35" rx="5"/><text class="body" x="760" y="208">CodingRuntime</text>
    <path d="M760 226 V236" stroke="#149c8e" stroke-width="2" marker-end="url(#arrow-teal)"/>
    <rect class="row teal-fill" x="622" y="238" width="276" height="35" rx="5"/><text class="body" x="760" y="256">active_run_id lease</text>
    <path d="M760 274 V284" stroke="#149c8e" stroke-width="2" marker-end="url(#arrow-teal)"/>
    <rect class="row teal-fill" x="622" y="286" width="276" height="35" rx="5"/><text class="body" x="760" y="304">构建 prompt</text>
    <path d="M760 322 V332" stroke="#149c8e" stroke-width="2" marker-end="url(#arrow-teal)"/>
    <rect class="row teal-fill" x="622" y="334" width="276" height="35" rx="5"/><text class="body" x="760" y="352">请求模型</text>
    <path d="M760 370 V380" stroke="#149c8e" stroke-width="2" marker-end="url(#arrow-teal)"/>
    <rect class="row teal-fill" x="622" y="382" width="276" height="35" rx="5"/><text class="body" x="760" y="400">解析输出 parse()</text>
    <path d="M760 418 V428" stroke="#149c8e" stroke-width="2" marker-end="url(#arrow-teal)"/>
    <rect class="row teal-fill" x="622" y="430" width="276" height="35" rx="5"/><text class="body-small" x="760" y="448">工具调用 / final / retry</text>
    <path d="M760 466 V476" stroke="#149c8e" stroke-width="2" marker-end="url(#arrow-teal)"/>
    <rect class="row teal-fill" x="622" y="478" width="133" height="43" rx="5"/><text class="body" x="688.5" y="500">typed events</text>
    <rect class="row teal-fill" x="765" y="478" width="133" height="43" rx="5"/><text class="body" x="831.5" y="500">run_finished</text>
  </g>

  <!-- 4 Context -->
  <g>
    <rect class="module blue-stroke" x="950" y="145" width="280" height="330" rx="12"/>
    <circle cx="983" cy="180" r="18" fill="#246bce"/><text class="number" x="983" y="181">4</text>
    <text class="header" x="1012" y="188">Context 管理</text>
    <rect class="row blue-fill" x="974" y="214" width="232" height="30" rx="5"/><text class="body" x="1090" y="229">ContextManager</text>
    <rect class="row blue-fill" x="974" y="251" width="232" height="30" rx="5"/><text class="body" x="1090" y="266">system prefix</text>
    <rect class="row blue-fill" x="974" y="288" width="232" height="30" rx="5"/><text class="body-small" x="1090" y="303">workspace reminders</text>
    <rect class="row blue-fill" x="974" y="325" width="232" height="30" rx="5"/><text class="body" x="1090" y="340">skill prompt</text>
    <rect class="row blue-fill" x="974" y="362" width="232" height="30" rx="5"/><text class="body-small" x="1090" y="377">working + durable memory</text>
    <rect class="row blue-fill" x="974" y="399" width="232" height="30" rx="5"/><text class="body-small" x="1090" y="414">history / current request</text>
    <rect class="row blue-fill" x="974" y="436" width="232" height="27" rx="5"/><text class="body" x="1090" y="450">budget reduction</text>
  </g>

  <!-- 7 Model adapter -->
  <g>
    <rect class="module blue-stroke" x="1535" y="145" width="350" height="280" rx="12"/>
    <circle cx="1569" cy="180" r="18" fill="#246bce"/><text class="number" x="1569" y="181">7</text>
    <text class="header" x="1599" y="188">模型适配层</text>
    <rect class="row blue-fill" x="1561" y="217" width="298" height="36" rx="5"/><text class="body" x="1710" y="235">DeepSeek V4 Flash / Pro</text>
    <rect class="row blue-fill" x="1561" y="262" width="298" height="36" rx="5"/><text class="body" x="1710" y="280">OpenAI-compatible</text>
    <rect class="row blue-fill" x="1561" y="307" width="298" height="36" rx="5"/><text class="body" x="1710" y="325">create_llm()</text>
    <rect class="row blue-fill" x="1561" y="352" width="145" height="44" rx="5"/><text class="body" x="1633.5" y="374">prompt cache</text>
    <rect class="row blue-fill" x="1714" y="352" width="145" height="44" rx="5"/><text class="body" x="1786.5" y="374">usage metadata</text>
  </g>

  <!-- 10 Benchmark -->
  <g>
    <rect class="module purple-stroke" x="40" y="575" width="325" height="260" rx="12"/>
    <circle cx="74" cy="610" r="18" fill="#59529a"/><text class="number" x="74" y="611" font-size="13">10</text>
    <text class="header" x="103" y="618">Harness 评测（侧车）</text>
    <rect class="row purple-fill" x="65" y="644" width="275" height="25" rx="5"/><text class="body-small" x="202.5" y="657">当前：Engine smoke</text>
    <rect class="row purple-fill" x="65" y="675" width="132" height="25" rx="5"/><text class="body-small" x="131" y="688">10 scenarios</text>
    <rect class="row purple-fill" x="208" y="675" width="132" height="25" rx="5"/><text class="body-small" x="274" y="688">ScriptedApiClient</text>
    <rect class="row purple-fill" x="65" y="706" width="132" height="25" rx="5"/><text class="body-small" x="131" y="719">task completion</text>
    <rect class="row purple-fill" x="208" y="706" width="132" height="25" rx="5"/><text class="body-small" x="274" y="719">tool success</text>
    <rect class="row purple-fill" x="65" y="737" width="132" height="25" rx="5"/><text class="body-small" x="131" y="750">policy compliance</text>
    <rect class="row purple-fill" x="208" y="737" width="132" height="25" rx="5"/><text class="body-small" x="274" y="750">P95 latency</text>
    <rect class="row purple-fill" x="65" y="768" width="275" height="38" rx="5"/><text class="body" x="202.5" y="787">JSON / Markdown report</text>
  </g>

  <!-- 6 Memory -->
  <g>
    <rect class="module green-stroke" x="410" y="610" width="395" height="225" rx="12"/>
    <circle cx="444" cy="645" r="18" fill="#3a8d2b"/><text class="number" x="444" y="646">6</text>
    <text class="header" x="474" y="653">记忆系统</text>
    <rect class="row green-fill" x="433" y="674" width="165" height="31" rx="5"/><text class="body" x="515.5" y="690">WorkingMemory</text>
    <rect class="row green-fill" x="616" y="674" width="166" height="31" rx="5"/><text class="body" x="699" y="690">DurableMemory</text>
    <rect class="row green-fill" x="433" y="712" width="165" height="26" rx="5"/><text class="body-small" x="515.5" y="725">per run · recent files</text>
    <rect class="row green-fill" x="433" y="744" width="165" height="26" rx="5"/><text class="body-small" x="515.5" y="757">last error · permission</text>
    <rect class="row green-fill" x="433" y="776" width="165" height="34" rx="5"/><text class="body-small" x="515.5" y="793">volatile context</text>
    <rect class="row green-fill" x="616" y="712" width="166" height="26" rx="5"/><text class="body-small" x="699" y="725">/remember</text>
    <rect class="row green-fill" x="616" y="744" width="166" height="26" rx="5"/><text class="body-small" x="699" y="757">/dream proposal</text>
    <rect class="row green-fill" x="616" y="776" width="166" height="34" rx="5"/><text class="body-small" x="699" y="793">MEMORY.md · daily · topics</text>
  </g>

  <!-- 5 Tool guard -->
  <g>
    <rect class="module orange-stroke" x="1018" y="570" width="454" height="275" rx="12"/>
    <circle cx="1053" cy="606" r="19" fill="#f28c18"/><text class="number" x="1053" y="607">5</text>
    <text class="header" x="1084" y="614">工具边界 / 护栏</text>
    <rect class="row orange-fill" x="1042" y="640" width="190" height="31" rx="5"/><text class="body" x="1137" y="656">Tool Registry</text>
    <rect class="row orange-fill" x="1250" y="640" width="198" height="31" rx="5"/><text class="body" x="1349" y="656">参数校验</text>
    <rect class="row orange-fill" x="1042" y="679" width="190" height="26" rx="5"/><text class="body-small" x="1137" y="692">list / read / search</text>
    <rect class="row orange-fill" x="1250" y="679" width="198" height="26" rx="5"/><text class="body-small" x="1349" y="692">permission / policy</text>
    <rect class="row orange-fill" x="1042" y="713" width="190" height="26" rx="5"/><text class="body-small" x="1137" y="726">write / patch</text>
    <rect class="row orange-fill" x="1250" y="713" width="198" height="26" rx="5"/><text class="body-small" x="1349" y="726">approval</text>
    <rect class="row orange-fill" x="1042" y="747" width="190" height="26" rx="5"/><text class="body-small" x="1137" y="760">run_shell</text>
    <rect class="row orange-fill" x="1250" y="747" width="198" height="26" rx="5"/><text class="body-small" x="1349" y="760">path guard</text>
    <rect class="row orange-fill" x="1042" y="781" width="190" height="38" rx="5"/><text class="body-small" x="1137" y="800">todos / plan / agent</text>
    <rect class="row orange-fill" x="1250" y="781" width="198" height="38" rx="5"/><text class="body-small" x="1349" y="800">repeat-call guard</text>
  </g>

  <!-- 9 Workspace -->
  <g>
    <rect class="module amber-stroke" x="1545" y="590" width="340" height="250" rx="12"/>
    <circle cx="1580" cy="626" r="19" fill="#e5a10b"/><text class="number" x="1580" y="627">9</text>
    <text class="header" x="1611" y="634">工作区 / Git / Shell</text>
    <rect class="row amber-fill" x="1571" y="662" width="288" height="30" rx="5"/><text class="body" x="1715" y="677">服务端受控仓库</text>
    <rect class="row amber-fill" x="1571" y="700" width="288" height="30" rx="5"/><text class="body" x="1715" y="715">WorkspaceContext</text>
    <rect class="row amber-fill" x="1571" y="738" width="140" height="30" rx="5"/><text class="body-small" x="1641" y="753">Git branch / status</text>
    <rect class="row amber-fill" x="1719" y="738" width="140" height="30" rx="5"/><text class="body-small" x="1789" y="753">文件工具</text>
    <rect class="row amber-fill" x="1571" y="776" width="140" height="38" rx="5"/><text class="body-small" x="1641" y="795">shell command</text>
    <rect class="row amber-fill" x="1719" y="776" width="140" height="38" rx="5"/><text class="body-small" x="1789" y="795">Workspace Diff</text>
  </g>

  <!-- 8 Persistence -->
  <g>
    <rect class="module green-stroke" x="760" y="860" width="760" height="145" rx="12"/>
    <circle cx="795" cy="895" r="19" fill="#3a8d2b"/><text class="number" x="795" y="896">8</text>
    <text class="header" x="826" y="903">Evidence 持久化</text>
    <rect class="row green-fill" x="786" y="925" width="220" height="28" rx="5"/><text class="body-small" x="896" y="939">.coding/sessions/&lt;id&gt;.json</text>
    <rect class="row green-fill" x="1018" y="925" width="220" height="28" rx="5"/><text class="body-small" x="1128" y="939">&lt;id&gt;.events.jsonl</text>
    <rect class="row green-fill" x="1250" y="925" width="244" height="28" rx="5"/><text class="body-small" x="1372" y="939">.coding/runs/evidence/</text>
    <rect class="row green-fill" x="786" y="962" width="220" height="28" rx="5"/><text class="body-small" x="896" y="976">&lt;session&gt;/runs/&lt;run&gt;</text>
    <rect class="row green-fill" x="1018" y="962" width="105" height="28" rx="5"/><text class="body-small" x="1070.5" y="976">trace.jsonl</text>
    <rect class="row green-fill" x="1133" y="962" width="105" height="28" rx="5"/><text class="body-small" x="1185.5" y="976">diff.json</text>
    <rect class="row green-fill" x="1250" y="962" width="118" height="28" rx="5"/><text class="body-small" x="1309" y="976">run summary</text>
    <rect class="row green-fill" x="1378" y="962" width="116" height="28" rx="5"/><text class="body-small" x="1436" y="976">memory/&lt;ws_id&gt;</text>
  </g>

  <!-- Legend -->
  <g>
    <rect x="70" y="1020" width="1780" height="48" rx="7" fill="#ffffff" stroke="#aebdca" stroke-width="1.4"/>
    <text x="102" y="1051" font-size="16" font-weight="760">图例</text>
    <path d="M170 1044 H235" class="control"/><text x="250" y="1050" font-size="13">主控制流</text>
    <path d="M390 1044 H455" fill="none" stroke="#246bce" stroke-width="3" marker-end="url(#arrow-blue)"/><text x="470" y="1050" font-size="13">模型请求 / 响应</text>
    <path d="M680 1044 H745" class="tool"/><text x="760" y="1050" font-size="13">工具执行 / 风险边界</text>
    <path d="M1035 1044 H1100" class="persist"/><text x="1115" y="1050" font-size="13">持久化 / 存储</text>
    <path d="M1340 1044 H1405" class="eval"/><text x="1420" y="1050" font-size="13">评测侧车路径</text>
  </g>
</svg>
