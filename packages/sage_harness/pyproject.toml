[project]
name = "sage-harness"
version = "0.1.0"
description = "Reusable agent harness contracts for Sage"
requires-python = ">=3.12"
dependencies = [
    "langchain==1.2.15",
    "langgraph==1.1.9",
]

[build-system]
requires = ["hatchling>=1.27,<2"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sage_harness"]
